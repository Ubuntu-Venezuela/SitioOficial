<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ubuntu Venezuela - Administrador de Contenidos</title>
  <!-- Estilos de Ubuntu-Ve paleta de colores -->
  <link rel="stylesheet" href="cms.css">
</head>
<body>
  <!-- Identity Widget para Inicio de Sesión Amigable (Email/Password/Github) sin programar backend -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <!-- Incluir el CMS gráfico Decap -->
  <script src="https://unpkg.com/decap-cms@^3.1.2/dist/decap-cms.js"></script>
  
  <!-- Lógica mágica de redirección después del login exitoso -->
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>
</body>
</html>
