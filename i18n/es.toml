[main_ubuntu_title]
other = "La distribución Linux más utilizada"
[main_ubuntu_desc]
other = """
Ubuntu es una de las distribuciones Linux más utilizadas del mundo.
Es conocida por ser un escritorio Linux fácil de usar y una distribución de servidor robusta y sencilla de configurar.
Ubuntu está optimizado para diversos dispositivos y entornos como Escritorio, Laptop, Servidor, Nube, Internet de las Cosas, Raspberry Pi y mucho más.
"""

[main_kr_loco_title]
other = "LoCo Team verificado (Local Community)"
[main_kr_loco_desc]
other = """
La Comunidad de Ubuntu Venezuela es un LoCo Team verificado oficialmente por el Ubuntu Community Council.
Brindamos foros localizados, documentación en español, y organizamos diversos seminarios y conferencias en el territorio nacional.
También organizamos grupos de estudio y proyectos de investigación/desarrollo sobre Ubuntu y software libre.
"""
