[main_ubuntu_title]
other = "The most widely used Linux distribution"
[main_ubuntu_desc]
other = """
Ubuntu is one of the most widely used Linux distributions in the world.
It is well known as a user-friendly Linux desktop and a robust, easy-to-configure server distribution.
Ubuntu is optimized for various devices and environments such as Desktop, Laptop, Server, Cloud, Internet of Things, Raspberry Pi, and much more.
"""

[main_kr_loco_title]
other = "Verified LoCo Team (Local Community)"
[main_kr_loco_desc]
other = """
The Ubuntu Venezuela Community is a LoCo Team officially verified by the Ubuntu Community Council.
We provide localized forums, documentation in Spanish, and organize various seminars and conferences within the national territory.
We also organize study groups and research/development projects on Ubuntu and Free Software.
"""
