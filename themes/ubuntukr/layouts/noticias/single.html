{{ define "main" }}
<div class="row" style="padding: 4rem 1rem; max-width: 800px; margin: 0 auto;">
  <div class="col-12" style="background: #fff; padding: 4rem 3rem; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); border: 1px solid #f0f0f0;">
    <a href="/noticias/" style="color: #E95420; text-decoration: none; font-weight: bold; font-size: 0.9rem; text-transform: uppercase;">&larr; Volver al Blog</a>
    
    <h1 style="margin-top: 2rem; color: #111; font-weight: 800; font-size: 2.5rem; line-height: 1.2; letter-spacing: -0.5px;">{{ .Title }}</h1>
    
    <p style="color: #777; font-size: 0.95rem; margin-top: 1.5rem; padding-bottom: 2rem; border-bottom: 1px solid #eaeaea;">
      Publicado el <strong>{{ .Date.Format "02 de Enero de 2006" }}</strong> por 
      <span style="color: #E95420; font-weight: bold;">{{ if .Params.author }}{{ .Params.author }}{{ else }}Ubuntu Bot{{ end }}</span>
    </p>
    
    <div class="p-article" style="margin-top: 3rem; font-size: 1.15rem; line-height: 1.8; color: #333;">
      {{ .Content }}
    </div>

    <!-- Tags if any -->
    {{ if .Params.tags }}
    <div style="margin-top: 4rem; padding-top: 2rem; border-top: 1px solid #eaeaea;">
      <h4 style="color: #111; font-size: 1rem; margin-bottom: 1rem;">Etiquetas:</h4>
      {{ range .Params.tags }}
      <span style="display: inline-block; background: #f4f4f4; color: #555; padding: 0.3rem 0.8rem; border-radius: 4px; font-size: 0.85rem; margin-right: 0.5rem; text-transform: capitalize;">#{{ . }}</span>
      {{ end }}
    </div>
    {{ end }}
  </div>
</div>
{{ end }}
